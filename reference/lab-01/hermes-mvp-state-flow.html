      explain: 'Stage 6 写两个必需要件：iteration_closeout_report（总结这次 Run 的所有结果、警告、决策、降级记录）和 system_improvement_proposals（给未来 Run 的建议）。低风险知识文件（.workflow/knowledge/*）可以自动更新，但 root AGENTS.md / CLAUDE.md / SOUL.md 只能写 proposal，不能自动改。',
      analogy: '工程收尾：写竣工验收报告、列出下次装修的建议、更新公司施工经验手册。但公司规章制度（root rule files）只能提建议，不能擅自修改。',
      whatHappened: 'closeout artifacts 生成。低风险知识自动更新。高风险变更写入 proposal。'
    },
    {
      title: 'Step 14: Run Completed! 🎉',
      subtitle: '完工',
      runStatus: 'completed', stage: 'all_done', stageNum: 6,
      progress: 100,
      events: [{seq:32, text:'run_completed'}],
      snapshot: {
        kimisAction: 'GET /orchestra/runs/capa001\n看到 status: completed',
        gatewayStatus: 'Completion Gate 通过:\n✓ closeout artifacts schema-valid\n✓ Audit closeout evidence\n✓ Kanban 6 stages done\n✓ Gateway State consistent\ncmd_001: completed',
        kanbanStatus: 'Parent: [done] ✓\nStage 1-6: [done] ✓',
        workers: '全部完成',
        artifacts: ['✓ structured_prd','✓ development_plan','✓ best_choice_report','✓ implementation_plan','✓ improvement_report','✓ global_eval_report','✓ iteration_closeout','✓ system_improvements','✓ test_plan','✓ test_execution'],
        audit: 'audit_099: closeout (closeout_kind=completed)\n共 15+ 条 audit 记录'
      },
      explain: 'Run 成为 completed 必须满足四个条件：closeout artifacts 格式正确、Audit 有收尾证据、Kanban 六个阶段都 done、Gateway State 和所有 artifact refs 一致。不是 Worker 说「我干完了」就算完，而是四个保险柜都确认才算完。',
      analogy: '正式交房：竣工验收报告齐全（closeout）、档案室有完整记录（Audit）、施工部确认所有工序完成（Kanban）、财务部账目平衡（State）。四个部门都盖章，才算真正完工。',
      whatHappened: 'Run completed！从 queued 到 completed 共经历了 14 个步骤、32 个 Events、15+ 条 Audit 记录、1 次改进循环、1 次 Kimi 决策。'
    },
    {
      title: 'Step 15: 如果 Gateway 崩溃了？',
      subtitle: 'Crash Recovery 演示',
      runStatus: 'running → recovery', stage: 'implementation', stageNum: 3,
      progress: 50,
      events: [{seq:15, text:'task_completed (codex)'},{seq:16, text:'[Gateway 崩溃!] → 重启'}],
      snapshot: {
        kimisAction: 'Event Stream 中断，等待 Gateway 恢复',
        gatewayStatus: '【重启后】\n扫描 Journal: cmd_001 in_progress\nReconciliation:\n  - Step 1-3: proven completed\n  - Step 4: unexecuted → continue\n  - Event append: 重建 from authorities',
        kanbanStatus: 'Stage 3: [running] (Kanban 独立存活)',
        workers: 'codex 进程可能已终止，需重新 dispatch',
        artifacts: 'State refs + Audit refs 完整，可验证',
        audit: 'Journal + Audit 共同证明:\n「codex 已完成，但 review task 未创建」'
      },
      explain: '假设在 Step 8 时 Gateway 崩溃。重启后，Gateway 扫描所有 in_progress 的 Command Records。通过 reconciliation 发现：State/Audit/Kanban 证明 codex 已完成（Step 1-3 done），但 review task 还没创建（Step 4 unexecuted）。于是 Gateway 从 Step 4 继续，不重复创建 codex task。',
      analogy: '装修公司突然停电。来电后，经理看账本（Journal）和各部门记录（State/Kanban/Audit）发现：「水电已完工，瓦工还没进场」。于是跳过水电，直接派瓦工。绝不会让水电工再干一遍。',
      whatHappened: 'Gateway 从 Journal + 权威链恢复状态，继续未执行的步骤，不盲重放已完成的步骤。'
    },
    {
      title: '总结：一次 Run 的数字',
      subtitle: '回顾',

      progress: 100,
      events: [],
      snapshot: {
        kimisAction: '回顾整个旅程',
        gatewayStatus: '6 个 Stage 全部完成',
        kanbanStatus: '1 Parent + 6 Stage tasks + 若干子任务',
        workers: '🔨 codex ×3 (code + improve ×2)\n🔍 claude ×3 (review + re_review + qa)',
        artifacts: '11 个结构化产物',
        audit: '15+ 条不可变记录'
      },
      explain: '这个任务走了完整的六阶段 DAG：方向辩论 → 方案辩论 → 实施 → 改进 → 全局评估 → 收尾。经历了 1 次评审失败和 1 次改进循环，1 次 Kimi 决策（pass_with_warnings）。所有变更都有 Audit 记录，所有产物都有 schema 校验。',
      analogy: '装修完工后盘点：6 个施工阶段、改了 2 个文件、1 次返工、1 次项目经理签字、15+ 条施工日志、完整的验收报告。',
      whatHappened: '漫游完成。理解了 Run 从创建到完成的完整状态流转。'
    }
  ]
};
</script>

<div x-data="stateFlowApp()" class="h-screen flex flex-col overflow-hidden">

  <!-- Header -->
  <header class="shrink-0 px-6 pt-4 pb-3 border-b border-gray-700">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-xl text-blue-400 font-bold" x-text="title"></h1>
        <p class="text-xs text-gray-500 mt-1">跟随「添加 /orchestra/capabilities 健康检查」任务的完整生命周期</p>
      </div>
      <div class="text-right">
        <div class="text-sm text-gray-300">Step <span class="text-blue-400 font-bold" x-text="current + 1"></span> / <span x-text="steps.length"></span></div>
        <div class="text-xs text-gray-600" x-text="step.subtitle"></div>
      </div>
    </div>
    <!-- Progress -->
    <div class="flex gap-1 mt-3">
      <template x-for="(s, i) in steps" :key="i">
        <button @click="goTo(i)"
          class="h-2 flex-1 rounded-full transition-all duration-300"
          :class="i < current ? 'bg-emerald-500' : i === current ? 'bg-blue-500' : 'bg-gray-700'"></button>
      </template>
    </div>
  </header>

  <!-- Main -->
  <main class="flex-1 overflow-hidden min-h-0 relative">
    <div class="h-full overflow-y-auto min-h-0 p-5">
      <div class="max-w-5xl mx-auto">

        <!-- Title -->
        <div class="mb-4">
          <h2 class="text-xl text-gray-100 font-bold" x-text="step.title"></h2>
          <p class="text-sm text-gray-400 mt-1" x-text="step.whatHappened"></p>
        </div>

        <!-- Analogy -->
        <div x-show="step.analogy" class="analogy-box text-gray-300 mb-4">
          <span class="text-amber-400 font-semibold">💡 类比：</span>
          <span x-text="step.analogy"></span>
        </div>

        <!-- Top: Run Status Card + Stage Progress -->
        <div class="grid grid-cols-[1fr_280px] gap-4 mb-4">
          <!-- Run Status -->
          <div class="snap-panel">
            <div class="flex items-center justify-between mb-2">
              <div class="snap-title text-blue-400">Run 状态</div>
              <span class="status-badge"
                :class="{
                  'bg-emerald-500/15 text-emerald-400 border border-emerald-500/30': step.runStatus === 'completed',
                  'bg-blue-500/15 text-blue-400 border border-blue-500/30': step.runStatus === 'running',
                  'bg-amber-500/15 text-amber-400 border border-amber-500/30': step.runStatus === 'blocked' || step.runStatus === 'queued',
                  'bg-red-500/15 text-red-400 border border-red-500/30': step.runStatus.includes('failed') || step.runStatus.includes('recovery'),
                  'bg-gray-700 text-gray-400 border border-gray-600': step.runStatus === '—'
                }"
                x-text="step.runStatus"></span>
            </div>
            <div class="flex items-center gap-3 text-xs text-gray-400 mb-2">
              <span>Run ID: <span class="text-gray-300">run_capa001</span></span>
              <span>Stage: <span class="text-gray-300" x-text="step.stage"></span></span>
              <span x-show="step.stageNum > 0" x-text="'( ' + step.stageNum + ' / 6 )'"></span>
            </div>
            <div class="stage-bar">
              <div class="stage-fill" :style="'width: ' + step.progress + '%'"></div>
            </div>
          </div>

          <!-- Events -->
          <div class="snap-panel">
            <div class="snap-title text-lime-400">最新 Events</div>
            <div x-show="step.events.length === 0" class="text-xs text-gray-600">暂无 Events</div>
            <template x-for="ev in step.events" :key="ev.seq">
              <div class="event-tag" x-text="'seq=' + ev.seq + ': ' + ev.text"></div>
            </template>
          </div>
        </div>

        <!-- Middle: System Snapshot -->
        <div class="grid grid-cols-2 gap-3 mb-4">
          <!-- Left: Actors -->
          <div class="snap-panel">
            <div class="snap-title text-gray-400">系统各层快照</div>
            <div class="actor-row">
              <span class="actor-icon">👤</span>
              <div class="flex-1 min-w-0">
                <div class="text-[10px] text-pink-400 font-semibold">Kimi (L1)</div>
                <div class="text-xs text-gray-400 truncate" x-text="step.snapshot.kimisAction"></div>
              </div>
            </div>
            <div class="actor-row">
              <span class="actor-icon">⚙️</span>
              <div class="flex-1 min-w-0">
                <div class="text-[10px] text-blue-400 font-semibold">Gateway (L3-L4)</div>
                <div class="text-xs text-gray-400 whitespace-pre-line" x-text="step.snapshot.gatewayStatus"></div>
              </div>
            </div>
            <div class="actor-row">
              <span class="actor-icon">📋</span>
              <div class="flex-1 min-w-0">
                <div class="text-[10px] text-orange-400 font-semibold">Kanban (L6)</div>
                <div class="text-xs text-gray-400 whitespace-pre-line" x-text="step.snapshot.kanbanStatus"></div>
              </div>
            </div>
            <div class="actor-row">
              <span class="actor-icon">🔨</span>
              <div class="flex-1 min-w-0">
                <div class="text-[10px] text-fuchsia-400 font-semibold">Workers (L11)</div>
                <div class="text-xs text-gray-400 whitespace-pre-line" x-text="step.snapshot.workers"></div>
              </div>
            </div>
          </div>

          <!-- Right: Artifacts + Audit -->
          <div class="snap-panel">
            <div class="snap-title text-cyan-400">Artifacts (L8)</div>
            <div x-show="typeof step.snapshot.artifacts === 'string'" class="text-xs text-gray-400" x-text="step.snapshot.artifacts"></div>
            <div x-show="Array.isArray(step.snapshot.artifacts)" class="flex flex-wrap gap-1">
              <template x-for="art in step.snapshot.artifacts" :key="art">
                <span class="artifact-tag"
                  :class="art.includes('✓') ? 'bg-cyan-500/10 text-cyan-300 border-cyan-500/30' : 'bg-gray-700 text-gray-400 border-gray-600'"
                  x-text="art"></span>
              </template>
            </div>

            <div class="snap-title text-red-400 mt-4">Audit (L7)</div>
            <div class="text-xs text-gray-400 whitespace-pre-line" x-text="step.snapshot.audit"></div>
          </div>
        </div>

        <!-- Bottom: Technical Explain -->
        <div class="snap-panel border-l-4 border-blue-500">
          <div class="snap-title text-blue-400">技术原理</div>
          <div class="text-sm text-gray-300 leading-relaxed" x-text="step.explain"></div>
        </div>

      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="shrink-0 px-6 py-3 border-t border-gray-700 bg-gray-900/50">
    <div class="max-w-5xl mx-auto flex items-center justify-between">
      <button @click="prev()" :disabled="current === 0" :class="current === 0 ? 'opacity-30' : ''"
        class="px-4 py-2 bg-gray-800 border border-gray-700 rounded text-sm hover:bg-gray-700 transition-colors">◀ 上一步</button>
      <div class="text-xs text-gray-500" x-text="current === steps.length - 1 ? '漫游完成！' : '点击下一步继续跟随任务流转'"></div>
      <button @click="next()" :disabled="current === steps.length - 1" :class="current === steps.length - 1 ? 'opacity-30' : ''"
        class="px-5 py-2 bg-blue-600 text-white rounded text-sm font-semibold hover:bg-blue-500 transition-colors">下一步 ▶</button>
    </div>
  </footer>
</div>

<script>
function stateFlowApp() {
  return {
    title: FLOW_CONFIG.title,
    subtitle: FLOW_CONFIG.subtitle,
    steps: FLOW_CONFIG.steps,
    current: 0,
    get step() { return this.steps[this.current]; },
    next() { if (this.current < this.steps.length - 1) this.current++; },
    prev() { if (this.current > 0) this.current--; },
    goTo(i) { this.current = i; }
  };
}
</script>

</body>
</html>
